[manifest]
version = "1.0.0"
dump_lua = true
priority = 0



# hits, barely, miss, cs.cBeat, noteType, mine


# Note collection

[[patches]]
[patches.pattern]
target = "obj/GameManager.lua"
pattern = '''function GameManager:addToScore(hits,barely,mine,beat)'''
position = "after"
payload = '''
-- im gonn ado my OWN addmine to total

if mine then

    if (not cs.mineTotals2[beat]) then
        cs.mineTotals2[beat] = true
    else
        hits = 0
    end

end



table.insert(DetailedAccNotes, {hits = (hits or 1), barely = barely or false, miss = false, beat = cs.cBeat, noteType = noteType, mine = mine or false})
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "obj/GameManager.lua"
pattern = '''function GameManager:handleMiss(hits,mine)'''
position = "after"
payload = '''

if mine then
    if (not cs.mineTotals2[beat2]) then
        cs.mineTotals2[beat2] = true
        hits2 = hits
    else
        hits2 = 0
    end

else

    hits2 = hits

end

table.insert(DetailedAccNotes, {hits = (hits2 or 1), barely = false, miss = true, beat = dumbTime or cs.cBeat, noteType = noteType, mine = mine or false})
'''
match_indent = true


[[patches]]
[patches.pattern]
target = "obj/GameManager.lua"
pattern = '''rw:play(cs.cBeat)'''
position = "before"
payload = '''

table.sort(cs.level.events, function(k1, k2)
    if k1.time ~= k2.time then
        return k1.time > k2.time
    end
    local o1 = k1.order or 0
    local o2 = k2.order or 0
    return o1 < o2
end)

DetailedAccBookmarks = {
    {time = 0,
    name = "Start"}
}


DAShowResults = nil

local path = "Mods/DetailedAcc/LvlData/" .. string.sub(cLevel,1,string.len(cLevel) - 1) .. ".json"

print(path)

LvlDataDA = {}

if love.filesystem.getInfo(path) then
    LvlDataDA = dpf.loadJson(path)
else

    --Need to create data
    LvlDataDA = {
        Override = false,
        Sections = {},
        SectionBests = {},
        MaxMissPSection = {}
    }

    dpf.saveJson(path, LvlDataDA)

end

if LvlDataDA.Sections then
    for i, v in pairs(LvlDataDA.Sections) do
        table.insert(DetailedAccBookmarks,  
            {
                time = v,
                name = i
            }
        )
    end
end


if not LvlDataDA.Override then

    for i, v in ipairs(cs.level.events) do
        if v.type == "bookmark" then
            table.insert(DetailedAccBookmarks,  
                {
                    time = v.time,
                    name = v.name
                }
            )
        end
        if v.type == "showResults" then
            DAShowResults = v.time
        end
    end

end




table.sort(DetailedAccBookmarks, function(k1, k2)
    if k1.time ~= k2.time then
        return k1.time > k2.time
    end
end)

DAShowResults = DAShowResults or (cs.level.events[#cs.level.events].time)

'''
match_indent = true













