[[patches]]
[patches.pattern]
target = "states/Results.lua"
pattern = '''st:setInit(function(self)'''
position = "after"
payload = '''
    
    DetailedAccAccs = {{100, 0}}

    setupDetailedAccResults = false

    local totalHits = 0
    local misses = 0
    local barelies = 0

    for i, v in ipairs(DetailedAccNotes) do

        if v.miss then
            misses = misses + math.max(v.hits, 1)
        elseif v.barely then
            barelies = barelies + v.hits
        end
        totalHits = totalHits + v.hits

        table.insert(DetailedAccAccs, {(((totalHits - misses - (barelies/4)) / totalHits)*100), v.beat})

    end

'''
match_indent = true


